<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 Attendance System</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 800px; margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .btn-submit { background-color: #007bff; color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: 600; margin-top: 15px; }
        #graph-output { margin-top: 20px; text-align: center; }
        #graph-output img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Attendance Checker</h1>
        <p style="color: #666;">Check absence records for each day</p>
    </div>

    <div class="card">
        <label for="daySelect" class="form-label">Select Day yey</label>
        <select id="daySelect" class="form-select">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
        </select>

        <label for="absenceInput" class="form-label mt-3">Number of absent</label>
        <input type="number" id="absenceInput" class="form-control" placeholder="Enter amount">
        
        <button id="submit-btn" class="btn-submit" py-click="handle_submit">Submit</button>
    </div>


    <div class="card">
        <h2 style="font-size: 1.2rem;">Attendance</h2>
        <hr>
        <div id="graph-output">
            <p class="text-muted">No data.</p>
        </div>
    </div>

        <div style="display:flex; gap:20px; align-items:center;">
    
    <li class="nav-item" style="list-style:none;">
        <a class="nav-link" href="classmatelist.html">Classmate List</a>
    </li>

    <li class="nav-item" style="list-style:none;">
        <a class="nav-link" href="attendancetracker.html">Attendance Checker</a>
    </li>

    <li class="nav-item" style="list-style:none;">
        <a class="nav-link" href="classactivities.html">Class Activities</a>
    </li> 
    
    </div>

    <script type="py" src="main.py" config='{"packages":["matplotlib", "numpy"]}'></script>

</body>
</html>
